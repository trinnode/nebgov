version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nebgov
      POSTGRES_PASSWORD: nebgov
      POSTGRES_DB: nebgov
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebgov"]
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    build: .
    environment:
      DATABASE_URL: postgres://nebgov:nebgov@postgres:5432/nebgov
      STELLAR_RPC_URL: https://soroban-testnet.stellar.org
      GOVERNOR_ADDRESS: ${GOVERNOR_ADDRESS:-}
      POLL_INTERVAL_MS: 5000
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
