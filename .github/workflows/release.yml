name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Run Tests
        run: |
          cargo test --workspace
          pnpm test:sdk
          pnpm test:app

      - name: Build and Optimize Contracts
        run: |
          cargo build --release --target wasm32-unknown-unknown
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/governor.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/timelock.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/token_votes.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/governor_factory.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/treasury.wasm

      - name: Publish SDK to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Configure npm for publishing
          echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" > ~/.npmrc
          pnpm --filter @nebgov/sdk build
          pnpm --filter @nebgov/sdk publish --access public --no-git-checks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/wasm32-unknown-unknown/release/*.optimized.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
