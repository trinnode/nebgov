name: SDK Integration Tests

on:
  workflow_dispatch:
    inputs:
      governor_address:
        description: Governor contract address
        required: true
        type: string
      timelock_address:
        description: Timelock contract address
        required: true
        type: string
      token_votes_address:
        description: Token-votes contract address
        required: true
        type: string
      rpc_url:
        description: Optional Soroban RPC URL override
        required: false
        default: https://soroban-testnet.stellar.org
        type: string

jobs:
  integration:
    name: SDK read-only integration
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run SDK integration tests
        run: pnpm --filter @nebgov/sdk test:integration
        env:
          TESTNET_SECRET_KEY: ${{ secrets.TESTNET_SECRET_KEY }}
          TESTNET_RPC_URL: ${{ inputs.rpc_url }}
          GOVERNOR_ADDRESS: ${{ inputs.governor_address }}
          TIMELOCK_ADDRESS: ${{ inputs.timelock_address }}
          TOKEN_VOTES_ADDRESS: ${{ inputs.token_votes_address }}
